<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fut Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: Arial, sans-serif; padding: 20px; }
        h1 { text-align: center; color: #22c55e; margin-bottom: 20px; }
        .jogo-card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h1>Jogos ao Vivo</h1>
    <div id="container-jogos">Carregando jogos...</div>

    <script>
        async function buscarJogos() {
            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                const container = document.getElementById('container-jogos');
                
                container.innerHTML = ''; // Limpa o "Carregando..."

                // Verifica se existem jogos
                if (data.response && data.response.length > 0) {
                    data.response.forEach(jogo => {
                        const card = document.createElement('div');
                        card.className = 'jogo-card';
                        card.innerHTML = `
                            <span>${jogo.teams.home.name} vs ${jogo.teams.away.name}</span>
                            <span>${jogo.goals.home} - ${jogo.goals.away}</span>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = 'Nenhum jogo ao vivo no momento.';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('container-jogos').innerHTML = 'Erro ao carregar dados.';
            }
        }

        buscarJogos();
    </script>
</body>
</html>
