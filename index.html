<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fut Analytics</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    color:#22c55e;
    margin-bottom:20px;
}

.palpites{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.palpites h2{
    margin-bottom:10px;
}

.palpites p{
    margin:6px 0;
}

#jogos{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
}

.ao-vivo{
    border-left:5px solid red;
}

.encerrado{
    border-left:5px solid #22c55e;
}

.agendado{
    border-left:5px solid #f59e0b;
}

.times{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.time{
    width:40%;
    text-align:center;
}

.time img{
    width:50px;
    height:50px;
}

.placar{
    font-size:28px;
    font-weight:bold;
}

.status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}

.competicao{
    text-align:center;
    color:#94a3b8;
    margin-top:5px;
}
</style>

</head>

<body>

<h1>⚽ FUT ANALYTICS</h1>

<div class="palpites">
    <h2>🎯 Central de Palpites</h2>
    <p>🔥 Jogo em destaque: Bélgica x Egito</p>
    <p>⚽ Ambas marcam: 72%</p>
    <p>📈 Over 2.5 gols: 68%</p>
    <p>🎯 Gol no 1º tempo: 74%</p>
    <p>🥅 Favorito: Bélgica</p>
    <p>🚩 Mais de 8.5 escanteios: 66%</p>
</div>

<div id="jogos">
Carregando jogos...
</div>

<script>
<script>
  async function carregarJogos() {
    try {
      const resposta = await fetch('/api/matches');
      const dados = await resposta.json();
      console.log(dados); // Os jogos aparecerão aqui no seu console
      // Aqui você vai adicionar a lógica para criar os cards na tela
    } catch (erro) {
      console.error("Erro ao carregar jogos:", erro);
    }
  }

  carregarJogos();
</script>
</script>

</body>
</html>
