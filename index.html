<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fut Analytics</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#00ff66;
}

#jogos{
    margin-top:20px;
}

.card{
    background:#222;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    border-left:4px solid #00ff66;
}

.status{
    color:#00ff66;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>⚽ FUT ANALYTICS</h1>

<h2>Jogos do Dia</h2>

<div id="jogos">
    <p>Carregando jogos...</p>
</div>

<script>
async function carregarJogos() {
    try {
        const resposta = await fetch('/api/matches');
        const dados = await resposta.json();

        const container = document.getElementById('jogos');
        container.innerHTML = '';

        dados.matches.forEach(jogo => {
            const card = document.createElement('div');
            card.className = 'card';

            card.innerHTML = `
                <h3>${jogo.homeTeam.name} x ${jogo.awayTeam.name}</h3>
                <p>Status: <span class="status">${jogo.status}</span></p>
                <p>Competição: ${jogo.competition.name}</p>
            `;

            container.appendChild(card);
        });
    } catch (erro) {
        document.getElementById('jogos').innerHTML =
            '<p>Erro ao carregar jogos.</p>';
    }
}

carregarJogos();
</script>

</body>
</html>
