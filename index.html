<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fut Analytics</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
}

header{
    background:#00ff66;
    color:#111;
    padding:20px;
    font-size:32px;
    font-weight:bold;
}

.card{
    background:#222;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.prob{
    color:#00ff66;
    font-size:20px;
}
</style>
</head>

<body>

<header>
⚽ FUT ANALYTICS
</header>

<div class="card">
<h2>Flamengo x Palmeiras</h2>
<p class="prob">Mais de 2.5 gols: 78%</p>
<p class="prob">Ambas marcam: 74%</p>
</div>

<div class="card">
<h2>Real Madrid x Barcelona</h2>
<p class="prob">Mais de 2.5 gols: 82%</p>
<p class="prob">Ambas marcam: 79%</p>
</div>

</body>
</html>
